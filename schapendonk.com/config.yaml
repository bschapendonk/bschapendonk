baseURL: https://schapendonk.com/
languageCode: en-us
title: schapendonk.com
paginate: 5
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

minify:
  disableXML: true

params:
  displayFullLangName: true
  socialIcons:
    - name: github
      url: https://github.com/bschapendonk
    - name: linkedin
      url: https://www.linkedin.com/in/bschapendonk/
    - name: twitter
      url: https://twitter.com/bschapendonk
    - name: mastodon
      url: https://mastodon.online/@bschapendonk

  profileMode:
    enabled: true

  assets:
    disableHLJS: true

  markup:
    goldmark:
      renderer:
        unsafe: true
    highlight:
      noClasses: false
      # anchorLineNos: true
      # codeFences: true
      # guessSyntax: true
      # lineNos: true
      # style: monokai

  privacy:
    vimeo:
      disabled: false
      simple: true

    twitter:
      disabled: false
      enableDNT: true
      simple: true

    instagram:
      disabled: false
      simple: true

    youtube:
      disabled: false
      privacyEnhanced: true

  services:
    instagram:
      disableInlineCSS: true
    twitter:
      disableInlineCSS: true
